<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenNana ChatGPT Prompt Archive</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; margin: 0; background:#0b1020; color:#e8ecf3; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .top { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:20px; }
    input, select { padding:10px 12px; border-radius:10px; border:1px solid #334; background:#121933; color:#fff; }
    .grid { display:grid; grid-template-columns: repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
    .card { background:#121933; border:1px solid #27304f; border-radius:16px; padding:16px; box-shadow:0 10px 30px rgba(0,0,0,.2); }
    .title { font-size:18px; font-weight:700; margin:0 0 8px; }
    .meta { color:#9fb0d0; font-size:13px; margin-bottom:10px; }
    .tags { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
    .tag { font-size:12px; padding:4px 8px; background:#1a2447; border-radius:999px; color:#b8c6e6; }
    pre { white-space:pre-wrap; word-break:break-word; background:#0b1020; border:1px solid #27304f; border-radius:12px; padding:12px; font-size:13px; }
    .row { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    button, a.btn { cursor:pointer; padding:9px 12px; border-radius:10px; border:1px solid #3850a8; background:#2563eb; color:#fff; text-decoration:none; font-size:13px; }
    button.secondary, a.secondary { background:#18213f; border-color:#334; }
    .count { color:#9fb0d0; font-size:14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>OpenNana ChatGPT Prompt Archive</h1>
    <div class="top">
      <input id="q" placeholder="搜索标题、标签、提示词" style="min-width:260px; flex:1" />
      <select id="lang">
        <option value="">全部语言</option>
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
      <div class="count" id="count">加载中...</div>
    </div>
    <div class="grid" id="grid"></div>
  </div>
  <script>
    const grid = document.getElementById('grid');
    const q = document.getElementById('q');
    const lang = document.getElementById('lang');
    const count = document.getElementById('count');
    let items = [];

    function copy(text) {
      navigator.clipboard.writeText(text).then(() => alert('已复制'));
    }

    function render() {
      const keyword = q.value.trim().toLowerCase();
      const wantedLang = lang.value;
      const filtered = items.filter(item => {
        const promptTexts = (item.prompts || []).map(p => p.text || '').join('\n');
        const hay = [item.title || '', (item.tags || []).join(' '), promptTexts].join(' ').toLowerCase();
        const langOk = !wantedLang || (item.prompts || []).some(p => (p.type || p.lang) === wantedLang);
        return (!keyword || hay.includes(keyword)) && langOk;
      });
      count.textContent = `共 ${filtered.length} / ${items.length} 条`;
      grid.innerHTML = filtered.map(item => {
        const zh = (item.prompts || []).find(p => (p.type || p.lang) === 'zh');
        const en = (item.prompts || []).find(p => (p.type || p.lang) === 'en');
        const main = zh || en || (item.prompts || [])[0];
        return `
          <div class="card">
            <div class="title">${escapeHtml(item.title || '')}</div>
            <div class="meta">${escapeHtml(item.source_name || '-')}</div>
            <div class="tags">${(item.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
            <pre>${escapeHtml(main?.text || '')}</pre>
            <div class="row">
              ${zh ? `<button onclick='copyPrompt(${JSON.stringify(zh.text)})'>复制中文</button>` : ''}
              ${en ? `<button onclick='copyPrompt(${JSON.stringify(en.text)})'>复制英文</button>` : ''}
              ${main ? `<button class="secondary" onclick='copyPrompt(${JSON.stringify(main.text)})'>复制主提示词</button>` : ''}
              <a class="btn secondary" href="${item.url}" target="_blank" rel="noreferrer">原页</a>
            </div>
          </div>
        `;
      }).join('');
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    window.copyPrompt = copy;
    q.addEventListener('input', render);
    lang.addEventListener('change', render);
    fetch('../data/chatgpt-prompts.min.json').then(r => r.json()).then(data => {
      items = data.items || [];
      render();
    }).catch(err => {
      count.textContent = '加载失败';
      console.error(err);
    });
  </script>
</body>
</html>
